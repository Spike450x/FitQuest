version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Batch all patch and minor bumps into a single PR — safe to merge
      patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      # Major version bumps (e.g. next 14 → 15) need manual review — keep separate
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # Cloud Functions package has its own lockfile; group its bumps separately
  # so a firebase-admin patch doesn't share a PR with a next.js minor.
  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # Keep SHA-pinned GitHub Actions in .github/workflows/ up to date.
  # Dependabot reads the trailing `# vX.Y.Z` tag comments to know what to bump to.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
