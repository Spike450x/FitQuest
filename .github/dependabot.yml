version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Batch all patch and minor bumps into a single PR — safe to merge
      patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      # Major version bumps (e.g. next 14 → 15) need manual review — keep separate
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
