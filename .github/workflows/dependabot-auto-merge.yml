name: Dependabot auto-merge

# Auto-merges Dependabot PRs that:
#   1. Are NOT semver-major bumps (those still need manual review)
#   2. Have all required CI checks green
#
# Major bumps fall through to manual review per .github/dependabot.yml's
# semver-major ignore policy — they shouldn't reach this workflow at all,
# but the metadata gate below is belt-and-suspenders.
#
# Why "auto-merge" instead of "merge immediately": GitHub's auto-merge
# feature waits for required status checks (branch protection's "Require
# status checks to pass before merging"). The PR queues with the squash
# option set; once CI lands green, GitHub merges automatically.

on:
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Enable auto-merge for non-major bumps
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
