name: Bundle Gate

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: bundle-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-check:
    name: Check bundle size regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:ci

      - name: Compare bundle against baseline
        id: bundle
        run: node scripts/bundle-stats.mjs --compare

      - name: Notify Discord on regression
        if: failure()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: ${{ steps.bundle.outputs.title || 'Bundle regression detected' }}
          description: 'PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}'
          fields: ${{ steps.bundle.outputs.fields || '[]' }}
          color: '16426522'
