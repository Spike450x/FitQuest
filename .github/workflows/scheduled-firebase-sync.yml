name: Scheduled Firebase Sync

# Redeploys Cloud Functions and Firestore rules/indexes on a weekly cadence.
# Prevents Cloud Run IAM drift (allUsers -> run.invoker binding) from silently
# breaking callable functions between feature deployments.
# Also available as a manual trigger for on-demand recovery.

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Redeploy Functions + Firestore Rules/Indexes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci --prefer-offline

      - name: Validate Firestore indexes
        run: node scripts/validate-firestore-indexes.mjs

      - name: Deploy Firestore rules and indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only firestore:rules,firestore:indexes
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive

      - name: Deploy Cloud Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only functions
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive
          --force

      - name: Restore Cloud Run IAM bindings
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${FIREBASE_TOKEN}" \
            -d "client_id=563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          SERVICES="logactivity claimcombatvictory claimdungeonrun"
          REGION="us-central1"
          PROJECT="fitness-rpg-claude"
          BASE="https://run.googleapis.com/v2/projects/${PROJECT}/locations/${REGION}/services"
          for svc in $SERVICES; do
            POLICY=$(curl -s -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              "${BASE}/${svc}:getIamPolicy")
            HAS_BINDING=$(echo "$POLICY" | python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          bindings = p.get('bindings', [])
          for b in bindings:
              if b.get('role') == 'roles/run.invoker' and 'allUsers' in b.get('members', []):
                  print('yes')
                  sys.exit(0)
          print('no')
          ")
            if [ "$HAS_BINDING" = "no" ]; then
              echo "Adding allUsers invoker binding to ${svc}"
              UPDATED=$(echo "$POLICY" | python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          bindings = p.get('bindings', [])
          found = False
          for b in bindings:
              if b.get('role') == 'roles/run.invoker':
                  if 'allUsers' not in b['members']:
                      b['members'].append('allUsers')
                  found = True
          if not found:
              bindings.append({'role': 'roles/run.invoker', 'members': ['allUsers']})
          p['bindings'] = bindings
          print(json.dumps({'policy': p}))
          ")
              curl -s -X POST \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATED" \
                "${BASE}/${svc}:setIamPolicy"
              echo "IAM binding restored for ${svc}"
            else
              echo "IAM binding already present for ${svc}"
            fi
          done

      - name: IAM smoke test - verify callable functions are publicly reachable
        # Hits live production Cloud Run URLs. A 401 means IAM is working (Firebase
        # auth required). A 403 means the allUsers -> run.invoker binding is missing.
        run: |
          sleep 15
          FUNCTIONS="claimDungeonRun claimCombatVictory logActivity"
          REGION="us-central1"
          PROJECT="fitness-rpg-claude"
          FAILED=""
          for fn in $FUNCTIONS; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://${REGION}-${PROJECT}.cloudfunctions.net/${fn}")
            if [ "$STATUS" = "403" ]; then
              echo "IAM FAIL: $fn returned HTTP 403 - allUsers invoker binding is missing"
              FAILED="$FAILED $fn"
            else
              echo "IAM OK: $fn returned HTTP $STATUS"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "IAM smoke test failed for:$FAILED"
            exit 1
          fi

      - name: Alert on failure - open GitHub issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Scheduled Firebase sync failed - $(date -u +'%Y-%m-%d')" \
            --body "The weekly Firebase sync workflow failed. Check the run logs for details. Possible causes: IAM binding drift, deploy token expired, or index validation error." \
            --label "bug"
