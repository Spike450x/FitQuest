name: Scheduled Firebase Sync

# Redeploys Cloud Functions and Firestore rules/indexes on a weekly cadence.
# Prevents Cloud Run IAM drift (allUsers -> run.invoker binding) from silently
# breaking callable functions between feature deployments.
# Also available as a manual trigger for on-demand recovery.

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Redeploy Functions + Firestore Rules/Indexes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci --prefer-offline

      - name: Validate Firestore indexes
        run: node scripts/validate-firestore-indexes.mjs

      - name: Deploy Firestore rules and indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only firestore:rules,firestore:indexes
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive

      - name: Deploy Cloud Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only functions
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive
          --force

      - name: Restore Cloud Run IAM bindings
        # Requires the GCP_SA_KEY secret: a Cloud Run Admin service-account JSON key.
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          rm /tmp/sa-key.json
          for svc in logactivity claimcombatvictory claimdungeonrun; do
            gcloud run services add-iam-policy-binding "$svc" \
              --member="allUsers" \
              --role="roles/run.invoker" \
              --region="us-central1" \
              --project="fitness-rpg-claude" \
              --quiet
            echo "IAM binding ensured for ${svc}"
          done

      - name: IAM smoke test - verify callable functions are publicly reachable
        # Hits live production Cloud Run URLs. A 401 means IAM is working (Firebase
        # auth required). A 403 means the allUsers -> run.invoker binding is missing.
        run: |
          sleep 15
          FUNCTIONS="claimDungeonRun claimCombatVictory logActivity"
          REGION="us-central1"
          PROJECT="fitness-rpg-claude"
          FAILED=""
          for fn in $FUNCTIONS; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://${REGION}-${PROJECT}.cloudfunctions.net/${fn}")
            if [ "$STATUS" = "403" ]; then
              echo "IAM FAIL: $fn returned HTTP 403 - allUsers invoker binding is missing"
              FAILED="$FAILED $fn"
            else
              echo "IAM OK: $fn returned HTTP $STATUS"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "IAM smoke test failed for:$FAILED"
            exit 1
          fi

      - name: Alert on failure - open GitHub issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Scheduled Firebase sync failed - $(date -u +'%Y-%m-%d')" \
            --body "The weekly Firebase sync workflow failed. Check the run logs for details. Possible causes: IAM binding drift, deploy token expired, or index validation error." \
            --label "bug"
