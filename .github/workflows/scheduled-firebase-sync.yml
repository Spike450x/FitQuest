name: Scheduled Firebase Sync

# Redeploys Cloud Functions and Firestore rules/indexes on a weekly cadence.
# Prevents Cloud Run IAM drift (allUsers → run.invoker binding) from silently
# breaking callable functions between feature deployments.
# Also available as a manual trigger for on-demand recovery.

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Redeploy Functions + Firestore Rules/Indexes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci --prefer-offline

      - name: Validate Firestore indexes
        run: node scripts/validate-firestore-indexes.mjs

      - name: Deploy Firestore rules and indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only firestore:rules,firestore:indexes
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive

      - name: Deploy Cloud Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only functions
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive
          --force
