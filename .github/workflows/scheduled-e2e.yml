---
name: Scheduled E2E

# Daily emulator-based E2E run against master. Catches regressions that slip
# past PR CI (e.g. flaky flows, drift in seeded fixtures, time-dependent bugs).
# Posts to Discord on every run — success and failure — so silent cron
# breakage is detectable.

on:
  schedule:
    - cron: '0 8 * * *' # daily 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: scheduled-e2e
  cancel-in-progress: false

jobs:
  e2e:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build Next.js (production-mode build for parity with prod)
        run: npm run build:ci

      - name: Run full E2E suite (composite action)
        uses: ./.github/actions/run-e2e-suite
        with:
          # Scheduled failures are useless without artifacts; trace + video
          # unconditionally so post-mortem doesn't need a re-run.
          playwright-flags: '--trace=on'

      - name: Format E2E results for Discord
        id: fmt
        if: always()
        env:
          RESULTS_PATH: test-results/results.json
          STATUS: ${{ job.status }}
          WORKFLOW_NAME: Scheduled E2E
          GITHUB_BRANCH: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/format-playwright-results.mjs

      - name: Notify Discord (always)
        if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: ${{ steps.fmt.outputs.title }}
          description: ${{ steps.fmt.outputs.description }}
          fields: ${{ steps.fmt.outputs.fields }}
          status: ${{ job.status }}
