name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firestore indexes
        run: node scripts/validate-firestore-indexes.mjs

      - name: Typecheck Cloud Functions
        run: cd functions && npm ci --prefer-offline && npx tsc --noEmit

      - name: Test Cloud Functions (pure-logic unit tests)
        run: cd functions && npm test

      # Fails immediately on high/critical vulnerabilities. Moderate dev-dep
      # vulns (e.g., firebase-tools transitive chain) are logged as warnings.
      # See docs/SECURITY-SETUP.md § Known devDependency vulnerabilities.
      - name: Audit production dependencies
        run: node scripts/audit-check.mjs

      - name: Audit Cloud Functions production dependencies
        run: cd functions && node ../scripts/audit-check.mjs

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test Firestore security rules
        run: >
          npx firebase emulators:exec
          --only firestore
          --project demo-fitness-rpg
          "npm run test:rules"

      - name: Build
        run: npm run build:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Firebase emulators for E2E (auth + firestore)
        run: |
          npx firebase emulators:start \
            --only auth,firestore \
            --project demo-fitness-rpg &
          # Poll until both emulators respond (max 60 s)
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9099 > /dev/null 2>&1 \
              && curl -sf http://127.0.0.1:8080 > /dev/null 2>&1 \
              && echo "Emulators ready" && break
            sleep 2
          done

      - name: E2E tests (unauthenticated + authenticated)
        run: npx playwright test
        env:
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: 'true'
          NEXT_PUBLIC_FIREBASE_API_KEY: e2e-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-fitness-rpg
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:e2etest'

      - name: Deploy Firestore rules and indexes
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only firestore:rules,firestore:indexes
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive

      - name: Check if functions changed
        id: functions-changed
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Cloud Functions
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only functions
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive
          --force # suppresses Artifact Registry cleanup-policy prompt in CI

      - name: Restore Cloud Run IAM bindings
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        # Firebase CLI only sets the allUsers -> roles/run.invoker binding on first
        # deploy; subsequent updates silently drop it. This step re-applies the binding
        # via the Cloud Run REST API so callable functions remain publicly reachable.
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${FIREBASE_TOKEN}" \
            -d "client_id=563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          SERVICES="logactivity claimcombatvictory claimdungeonrun"
          REGION="us-central1"
          PROJECT="fitness-rpg-claude"
          BASE="https://run.googleapis.com/v2/projects/${PROJECT}/locations/${REGION}/services"
          for svc in $SERVICES; do
            POLICY=$(curl -s -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              "${BASE}/${svc}:getIamPolicy")
            HAS_BINDING=$(echo "$POLICY" | python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          bindings = p.get('bindings', [])
          for b in bindings:
              if b.get('role') == 'roles/run.invoker' and 'allUsers' in b.get('members', []):
                  print('yes')
                  sys.exit(0)
          print('no')
          ")
            if [ "$HAS_BINDING" = "no" ]; then
              echo "Adding allUsers invoker binding to ${svc}"
              UPDATED=$(echo "$POLICY" | python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          bindings = p.get('bindings', [])
          found = False
          for b in bindings:
              if b.get('role') == 'roles/run.invoker':
                  if 'allUsers' not in b['members']:
                      b['members'].append('allUsers')
                  found = True
          if not found:
              bindings.append({'role': 'roles/run.invoker', 'members': ['allUsers']})
          p['bindings'] = bindings
          print(json.dumps({'policy': p}))
          ")
              curl -s -X POST \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATED" \
                "${BASE}/${svc}:setIamPolicy"
              echo "IAM binding restored for ${svc}"
            else
              echo "IAM binding already present for ${svc}"
            fi
          done

      - name: IAM smoke test - verify callable functions are publicly reachable
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        # Hits live production Cloud Run URLs. A 401 means IAM is working (Firebase
        # auth required). A 403 means the allUsers -> run.invoker binding is missing.
        run: |
          sleep 15
          FUNCTIONS="claimDungeonRun claimCombatVictory logActivity"
          REGION="us-central1"
          PROJECT="fitness-rpg-claude"
          FAILED=""
          for fn in $FUNCTIONS; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://${REGION}-${PROJECT}.cloudfunctions.net/${fn}")
            if [ "$STATUS" = "403" ]; then
              echo "IAM FAIL: $fn returned HTTP 403 - allUsers invoker binding is missing"
              FAILED="$FAILED $fn"
            else
              echo "IAM OK: $fn returned HTTP $STATUS"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "IAM smoke test failed for:$FAILED"
            exit 1
          fi
