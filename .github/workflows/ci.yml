name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firestore indexes
        run: node scripts/validate-firestore-indexes.mjs

      - name: Typecheck Cloud Functions
        run: cd functions && npm ci --prefer-offline && npx tsc --noEmit

      # Non-blocking audit so a freshly-published advisory surfaces in PR
      # checks without immediately blocking the merge. If a high-severity
      # vuln appears, follow the workflow in docs/SECURITY-SETUP.md § 8.
      - name: Audit dependencies (root, non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Audit dependencies (functions, non-blocking)
        continue-on-error: true
        run: cd functions && npm audit --audit-level=high

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test Firestore security rules
        run: >
          npx firebase emulators:exec
          --only firestore
          --project demo-fitness-rpg
          "npm run test:rules"

      - name: Build
        run: npm run build:ci

      - name: Deploy Firestore rules and indexes
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only firestore:rules,firestore:indexes
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive

      - name: Check if functions changed
        id: functions-changed
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Cloud Functions
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only functions
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive
          --force # suppresses Artifact Registry cleanup-policy prompt in CI
