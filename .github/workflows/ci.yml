name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firestore indexes
        run: node scripts/validate-firestore-indexes.mjs

      - name: Typecheck Cloud Functions
        run: cd functions && npm ci --prefer-offline && npx tsc --noEmit

      - name: Test Cloud Functions (pure-logic unit tests)
        run: cd functions && npm test

      # Fails on moderate/high/critical vulnerabilities in production deps.
      # Moderate-or-above vulns in devDependencies are logged as warnings.
      # See docs/SECURITY-SETUP.md § Known devDependency vulnerabilities.
      - name: Audit production dependencies
        run: node scripts/audit-check.mjs

      - name: Audit Cloud Functions production dependencies
        run: cd functions && node ../scripts/audit-check.mjs

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test Firestore security rules
        run: >
          npx firebase emulators:exec
          --only firestore
          --project demo-fitness-rpg
          "npm run test:rules"

      - name: Build
        run: npm run build:ci

      - name: Update bundle baseline
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: node scripts/bundle-stats.mjs --write

      - name: Commit baseline if changed
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/bundle-baseline.json || (
            git add docs/bundle-baseline.json &&
            git commit -m "chore: update bundle baseline [skip ci]" &&
            git push
          )

      - name: Run E2E suite (composite action)
        id: e2e
        uses: ./.github/actions/run-e2e-suite

      # Notify Discord only on failure on master pushes. Keeps PR-channel
      # noise low; deploy-time regressions still ping.
      - name: Format CI results for Discord
        id: fmt
        if: failure() && github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          RESULTS_PATH: test-results/results.json
          STATUS: ${{ job.status }}
          WORKFLOW_NAME: CI
          GITHUB_BRANCH: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/format-playwright-results.mjs

      - name: Notify Discord on master failure
        if: failure() && github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: ${{ steps.fmt.outputs.title || 'CI Failure' }}
          description: ${{ steps.fmt.outputs.description }}
          fields: ${{ steps.fmt.outputs.fields }}
          status: ${{ job.status }}

      - name: Deploy Firestore rules and indexes
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only firestore:rules,firestore:indexes
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive

      - name: Check if functions changed
        id: functions-changed
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Cloud Functions
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx firebase deploy
          --only functions
          --project fitness-rpg-claude
          --token "$FIREBASE_TOKEN"
          --non-interactive
          --force # suppresses Artifact Registry cleanup-policy prompt in CI

      - name: Restore Cloud Run IAM bindings
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        # Firebase CLI only sets allUsers -> roles/run.invoker on first deploy,
        # silently dropping it on updates. Re-apply via gcloud so callable
        # functions remain publicly reachable after every deploy.
        # Requires the GCP_SA_KEY secret: a Cloud Run Admin service-account JSON key.
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          rm /tmp/sa-key.json
          for svc in logactivity claimcombatvictory claimdungeonrun; do
            gcloud run services add-iam-policy-binding "$svc" \
              --member="allUsers" \
              --role="roles/run.invoker" \
              --region="us-central1" \
              --project="fitness-rpg-claude" \
              --quiet
            echo "IAM binding ensured for ${svc}"
          done

      - name: IAM smoke test - verify callable functions are publicly reachable
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          steps.functions-changed.outputs.changed == 'true'
        # Hits live production Cloud Run URLs. A 401 means IAM is working (Firebase
        # auth required). A 403 means the allUsers -> run.invoker binding is missing.
        run: |
          sleep 15
          FUNCTIONS="claimDungeonRun claimCombatVictory logActivity"
          REGION="us-central1"
          PROJECT="fitness-rpg-claude"
          FAILED=""
          for fn in $FUNCTIONS; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://${REGION}-${PROJECT}.cloudfunctions.net/${fn}")
            if [ "$STATUS" = "403" ]; then
              echo "IAM FAIL: $fn returned HTTP 403 - allUsers invoker binding is missing"
              FAILED="$FAILED $fn"
            else
              echo "IAM OK: $fn returned HTTP $STATUS"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "IAM smoke test failed for:$FAILED"
            exit 1
          fi
