name: Discord Notify
description: |
  General-purpose Discord embed poster. Callers build title/description/fields
  themselves; Playwright result formatting lives in scripts/format-playwright-results.mjs.

inputs:
  webhook-url:
    description: Discord webhook URL. Should come from `secrets.DISCORD_WEBHOOK_URL`.
    required: true
  title:
    description: Embed heading.
    required: false
    default: 'CI Notification'
  description:
    description: Body text below the title.
    required: false
    default: ''
  color:
    description: Embed color as a decimal integer string. If omitted, derived from status.
    required: false
    default: ''
  fields:
    description: JSON array string of embed fields — [{"name":"…","value":"…","inline":true}].
    required: false
    default: '[]'
  status:
    description: Job status (success / failure / cancelled). Auto-selects color when color is omitted.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Post to Discord
      shell: bash
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.webhook-url }}
        NOTIFY_TITLE: ${{ inputs.title }}
        NOTIFY_DESCRIPTION: ${{ inputs.description }}
        NOTIFY_COLOR: ${{ inputs.color }}
        NOTIFY_FIELDS: ${{ inputs.fields }}
        NOTIFY_STATUS: ${{ inputs.status }}
        GITHUB_BRANCH: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: node ${{ github.action_path }}/notify.mjs
