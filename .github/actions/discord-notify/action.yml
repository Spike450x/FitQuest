name: Discord Notify
description: |
  Reads Playwright's JSON report (test-results/results.json) and posts a
  Discord embed with pass/fail counts, top failures, and a run link.

inputs:
  webhook-url:
    description: Discord webhook URL. Should come from `secrets.DISCORD_WEBHOOK_URL`.
    required: true
  status:
    description: Job status (success / failure / cancelled). Pass the workflow's job.status expression.
    required: true
  workflow-name:
    description: Display name for the embed title.
    required: false
    default: ${{ github.workflow }}
  results-path:
    description: Path to the Playwright JSON report file.
    required: false
    default: test-results/results.json

runs:
  using: composite
  steps:
    - name: Post to Discord
      shell: bash
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.webhook-url }}
        JOB_STATUS: ${{ inputs.status }}
        WORKFLOW_NAME: ${{ inputs.workflow-name }}
        RESULTS_PATH: ${{ inputs.results-path }}
        GITHUB_BRANCH: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: node ${{ github.action_path }}/notify.mjs
