<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FitQuest">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45" />
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners — the OS masks it) -->
  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="url(#glow)" />

  <!-- Sword scaled to 80% so all visual content stays in the safe zone -->
  <g transform="translate(256 256) scale(0.78) rotate(-45)">
    <rect x="-22" y="-180" width="44" height="240" rx="6" fill="url(#blade)" />
    <rect x="-22" y="-180" width="44" height="240" rx="6" fill="none" stroke="#92400e" stroke-width="3" stroke-opacity="0.4" />
    <polygon points="-22,-180 22,-180 0,-212" fill="url(#blade)" stroke="#92400e" stroke-width="3" stroke-opacity="0.4" />
    <rect x="-86" y="60" width="172" height="22" rx="6" fill="#475569" />
    <rect x="-86" y="60" width="172" height="22" rx="6" fill="none" stroke="#1e293b" stroke-width="2" />
    <rect x="-14" y="82" width="28" height="64" rx="6" fill="#92400e" />
    <line x1="-14" y1="98" x2="14" y2="98" stroke="#451a03" stroke-width="2" />
    <line x1="-14" y1="114" x2="14" y2="114" stroke="#451a03" stroke-width="2" />
    <line x1="-14" y1="130" x2="14" y2="130" stroke="#451a03" stroke-width="2" />
    <circle cx="0" cy="156" r="16" fill="#facc15" stroke="#92400e" stroke-width="3" />
  </g>
</svg>
