<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FitQuest">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <radialGradient id="sheen" cx="0.35" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.30)" />
      <stop offset="55%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <radialGradient id="bladeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(251, 191, 36, 0.55)" />
      <stop offset="65%" stop-color="rgba(251, 191, 36, 0)" />
    </radialGradient>
  </defs>

  <!-- Full-bleed background (OS masks the corners on maskable icons) -->
  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="url(#sheen)" />

  <!-- Shield + sword scaled to 78% so all visual content stays in the safe zone -->
  <g transform="translate(256 268) scale(0.78)">
    <path d="M 0 -150 L 110 -130 C 110 -10, 90 100, 0 170 C -90 100, -110 -10, -110 -130 Z" fill="rgba(0,0,0,0.18)" />
    <path d="M 0 -160 L 116 -134 C 116 -8, 92 100, 0 170 C -92 100, -116 -8, -116 -134 Z" fill="none" stroke="#fbbf24" stroke-width="6" />
    <path d="M 0 -140 L 100 -120 C 100 -10, 80 90, 0 152 C -80 90, -100 -10, -100 -120 Z" fill="rgba(255,255,255,0.10)" />
    <circle cx="0" cy="0" r="120" fill="url(#bladeGlow)" />
    <g>
      <circle cx="0" cy="98" r="16" fill="#facc15" stroke="#78350f" stroke-width="4" />
      <rect x="-12" y="34" width="24" height="64" fill="#78350f" />
      <line x1="-12" y1="50" x2="12" y2="50" stroke="#451a03" stroke-width="3" />
      <line x1="-12" y1="66" x2="12" y2="66" stroke="#451a03" stroke-width="3" />
      <line x1="-12" y1="82" x2="12" y2="82" stroke="#451a03" stroke-width="3" />
      <rect x="-72" y="14" width="144" height="20" rx="4" fill="#475569" />
      <rect x="-72" y="14" width="144" height="20" rx="4" fill="none" stroke="#1e293b" stroke-width="2" />
      <path d="M -16 14 L -16 -118 L 0 -150 L 16 -118 L 16 14 Z" fill="url(#blade)" />
      <path d="M -16 14 L -16 -118 L 0 -150 L 16 -118 L 16 14 Z" fill="none" stroke="#78350f" stroke-width="3" stroke-opacity="0.5" />
      <line x1="0" y1="-118" x2="0" y2="14" stroke="rgba(255,255,255,0.55)" stroke-width="2" />
    </g>
  </g>
</svg>
